# WingSync - Discord Whitelist Sync Plugin

# ========================================
# DISCORD BOT CONFIGURATION
# ========================================
# To get your bot token:
# 1. Go to https://discord.com/developers/applications
# 2. Create a new application or select existing one
# 3. Go to "Bot" section
# 4. Click "Reset Token" or "Copy" to get your token
# 5. Paste it below (keep the quotes!)
#
# After updating this file, use /wsreload in-game to connect the bot.
# ========================================

discord:
  # Your Discord bot token - REQUIRED
  # Replace YOUR_DISCORD_BOT_TOKEN with your actual token
  token: "YOUR_DISCORD_BOT_TOKEN"

  # Your Discord Guild (Server) ID - REQUIRED for ban syncing
  # To get your guild ID: Enable Developer Mode in Discord settings,
  # then right-click your server icon and click "Copy Server ID"
  guild_id: "YOUR_DISCORD_GUILD_ID"

  # Your Discord user ID (for admin permissions on /remove command)
  # To get your ID: Enable Developer Mode in Discord settings,
  # then right-click yourself and click "Copy User ID"
  admin_id: "YOUR_DISCORD_ADMIN_ID"

  # Set to false to disable Discord ban synchronization (default: true)
  sync_bans: true

# ========================================
# STORAGE CONFIGURATION
# ========================================
# Controls where WingSync stores player link data.
#
# type options:
#   json       - File-based storage (playerdata.json). No setup required. (default)
#   mysql      - MySQL database. Default port: 3306
#   postgresql - PostgreSQL database. Default port: 5432
#
# host, port, database, username, password are ignored when type is json.
# ========================================

storage:
  type: json
  host: localhost
  port: 1234
  database: minecraft
  username: root
  password: password123