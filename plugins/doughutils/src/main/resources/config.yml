# DoughUtils — unified config

# =======================
# DO NOT CHANGE THIS VALUE
# =======================
version: 1.0.0

# ========================
# Global Flight Settings
# ========================
flight:
  allflight: false          # Enable global flight for all players
  base-radius: 100          # Radius around base where flight is allowed
  communal-zones:
    enabled: true           # Enable communal fly zones

# ========================
# Vein-Miner Configuration
# ========================
veinminer:
  enabled: true
  tree-remover:
    max-blocks: 100
    max-height: 30
  ore-remover:
    max-blocks: 100
    max-height: 30

# ========================
# Spawn Configuration
# ========================
spawn:
  world: "world"
  x: 0.0
  y: 65.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# ========================
# Base Configuration
# ========================
base-teleport:
  cooldown-hours: 1

bases: {}
base.cooldowns: {}

# ========================
# Sounds
# ========================
sounds:
  base: "ENTITY_ENDERMAN_TELEPORT"

# ========================
# Playtime Tracking
# ========================
playtime-tracking:
  enabled: true

# ========================
# Roleplay Messages
# ========================
meow-command:
  messages:
    - "mrrp!"
    - "bwaa!"
    - "uwu X3 rwar *pounces on you*"
    - "nya!"
    - "meow"
    - ":3"
    - "rwar"
    - "X3"

bark-command:
  messages:
    - "woof!"
    - "arf!"
    - "bork!"
    - "awoo!"
    - "*wags tail*"
    - "ruff!"
    - "*runs in circles*"
    - "henlo fren!"

# ========================
# Jail Configuration
# ========================
jail:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# ========================
# WingSync Configuration
# ========================
wingsync:
  discord:
    token: "YOUR_DISCORD_BOT_TOKEN"
    guild_id: "YOUR_DISCORD_GUILD_ID"
    admin_id: "YOUR_DISCORD_ADMIN_ID"
    sync_bans: true
  storage:
    type: json           # json | mysql | postgresql
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""
