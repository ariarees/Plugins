name: Doughcord
version: 5.4.0-HOTFIX
main: win.doughmination.doughcord.CordMain
api-version: 1.21.11
depend: [DoughAPI]
author: Doughmination
website: "https://modding.doughmination.win"

# Commands
commands:
  doughban:
    description: Ban a player from the server
    usage: /ban <player> [reason]
    permission: dough.ban
    permission-message: §cYou do not have permission to ban players!
  unban:
    description: Unban a player from the server
    usage: /unban <player>
    permission: dough.unban
    permission-message: §cYou do not have permission to unban players!
  banlist:
    description: View all banned players
    usage: /banlist
    permission: dough.banlist
    permission-message: §cYou do not have permission to view the ban list!
  recipes:
    description: Get the URL to view all spawn egg recipes
    usage: /recipes
    permission: dough.recipes
    permission-message: §cYou don't have permission to use this command!
  version:
    description: Display the plugin version and credits.
  setspawn:
    description: Set the spawn location
    permission: dough.setspawn
  spawn:
    description: Teleport to the spawn location
  doughreload:
    description: Reload the doughminationcord plugin configuration
    usage: /doughreload
    permission: dough.reload
    permission-message: §cYou do not have permission to reload this plugin!
  tpa:
    description: Ask to tp to another player
    usage: /tp <player>
    permission: dough.tpa
    permission-message: §cYou don't have permission to use this command!
  tpaccept:
    description: Accept a tp request
    usage: /tpaccept
    permission: dough.tpaccept
    permission-message: §cYou don't have permission to use this command!
  tpdeny:
    description: Deny a tp request
    usage: /tpdeny
    permission: dough.tpdeny
    permission-message: §cYou don't have permission to use this command!
  playtime:
    description: Check your total playtime on the server.
    usage: /playtime
    permission: dough.playtime
    permission-message: §cYou don't have permission to use this command!
  dough:
    description: Show help information for Doughminationcord commands
    usage: /dough <page>
    permission: dough.use
    aliases: [ ec ]
  base:
    description: Manage your base — teleport, set, name, protect and trust players. Use /base visit <player> (op only) to visit another player's base.
    usage: /base [tp|set|name|trust|untrust|info|visit]
  kiss:
    description: Kiss another player
    usage: /kiss <player>
    permission: dough.kiss
    permission-message: §cYou don't have permission to use this command!
  meow:
    description: Send a cute cat message
    usage: /meow
    permission: dough.meow
    permission-message: §cYou don't have permission to use this command!
  bark:
    description: Send a cute dog message
    usage: /bark
    permission: dough.bark
    permission-message: §cYou don't have permission to use this command!
  veinminer:
    description: Toggle vein mining for ores or trees
    usage: /veinminer <ores|trees>
  basefly:
    description: Toggle flight within base radius
    usage: /basefly <on|off>
  flyzone:
    description: Create a communal flight zone
    usage: /flyzone <x1> <y1> <z1> <x2> <y2> <z2> <name>
    permission: dough.flyzone
  rmflyzone:
    description: Remove a communal flight zone
    usage: /rmflyzone <name>
    permission: dough.flyzone
  echest:
    description: Remotely open your ender chest
    usage: /echest
    permission: dough.echest
    permission-message: §cYou do not have permission to use this command!
  vchest:
    description: Remotely open your VIP ender chest
    usage: /echest
    permission: dough.vchest
    permission-message: §cYou do not have permission to use this command!
  chest:
    description: Inspect a player's ender chest, VIP chest, or inventory (moderation)
    usage: /chest <echest|vchest|inv> <player> [take <slot>]
    permission: dough.chest.inspect
    permission-message: §cYou do not have permission to inspect player inventories!
  growthpotion:
    description: Gives you a growth potion
    usage: /growthpotion
    permission: dough.growthpotion
  shrinkpotion:
    description: Gives you a shrink potion
    usage: /shrinkpotion
    permission: dough.shrinkpotion
  rtp:
    description: Teleport to a random location
    usage: /rtp
    permission: doughcord.rtp

# Permissions
permissions:
  dough.ban:
    description: Allows banning players
    default: op
  dough.unban:
    description: Allows unbanning players
    default: op
  dough.banlist:
    description: Allows viewing the ban list
    default: op
  dough.reload:
    description: Allows reloading of the Doughminationcord plugin.
    default: op
  dough.visitbase:
    description: Allows players to teleport to other players' bases.
    default: op
  dough.setspawn:
    description: Allows players to set spawn.
    default: op
  dough.kiss:
    description: Allows players to use the kiss command.
    default: true
  dough.meow:
    description: Allows players to use the meow command.
    default: true
  dough.bark:
    description: Allows players to use the bark command.
    default: true
  dough.playtime:
    description: Allows players to check their playtime.
    default: true
  dough.tpa:
    description: Allows player to ask to tp to another player.
    default: true
  dough.tpaccept:
    description: Allows a player to accept a tp request.
    default: true
  dough.tpdeny:
    description: Allows a player to deny a tp request.
    default: true
  dough.use:
    description: Allows a player to see the help section.
    default: true
  dough.flyzone:
    description: Permission to manage communal fly zones
    default: op
  dough.echest:
    description: Allows players to use /echest to open their ender chest remotely.
    default: true
  dough.vchest:
    description: Allows VIP players to open a separate larger double chest via /vchest.
    default: op
  dough.chest.inspect:
    description: Allows staff to inspect any player's echest, vchest, or inventory via /chest.
    default: op
  dough.chest.take:
    description: Allows staff to remove items from a player's echest, vchest, or inventory via /chest ... take <slot>.
    default: op
  dough.growthpotion:
    description: Gives a growth potion
    default: op
  dough.shrinkpotion:
    description: Gives a shrink potion
    default: op
  dough.recipes:
    description: Allows players to view spawn egg recipes URL
    default: true
  doughcord.rtp:
    description: Allows use of /rtp
    default: true